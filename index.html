<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Case Repository - Standalone</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .case-card:hover { transform: translateY(-2px); transition: all 0.2s ease; }
    </style>
<script src="/_aistudio-iframe.js"></script></head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Legal Case Repository</h1>
                <p class="text-sm text-gray-500 mt-1">Full Standalone Database & Admin Tool</p>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <div id="adminActions" class="hidden flex items-center gap-2">
                    <button id="importBtn" class="flex items-center gap-2 px-3 py-2 bg-black text-white rounded-xl text-xs font-bold hover:bg-gray-800 transition-all">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i> Import
                    </button>
                    <button id="clearBtn" class="flex items-center gap-2 px-3 py-2 bg-red-50 text-red-600 border border-red-100 rounded-xl text-xs font-bold hover:bg-red-100 transition-all">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Clear
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <span id="authStatus" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mr-2"></span>
                    <button id="exportCsvBtn" class="flex items-center gap-2 px-3 py-2 bg-gray-100 text-gray-700 rounded-xl text-xs font-bold hover:bg-gray-200 transition-all">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> CSV
                    </button>
                    <button id="loginBtn" class="flex items-center gap-2 px-3 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold hover:bg-blue-700 transition-all">
                        <i data-lucide="log-in" class="w-3.5 h-3.5"></i> Admin Login
                    </button>
                    <button id="logoutBtn" class="hidden flex items-center gap-2 px-3 py-2 bg-gray-100 text-gray-700 rounded-xl text-xs font-bold hover:bg-gray-200 transition-all">
                        <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Logout
                    </button>
                </div>
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="Search cases..."
                        class="pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-black/5 w-48 md:w-64"
                    >
                </div>
            </div>
        </header>

        <input type="file" id="fileInput" class="hidden" accept=".json,.csv">

        <!-- Custom Notification -->
        <div id="notification" class="fixed bottom-4 right-4 z-50 transform translate-y-20 opacity-0 transition-all duration-300">
            <div class="bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 border border-white/10">
                <span id="notificationText" class="text-sm font-medium"></span>
            </div>
        </div>

        <!-- Custom Confirmation Modal -->
        <div id="confirmModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl border border-gray-100">
                <h3 class="text-lg font-bold text-gray-900 mb-2">Are you sure?</h3>
                <p id="confirmMessage" class="text-sm text-gray-500 mb-6"></p>
                <div class="flex gap-3">
                    <button id="confirmCancel" class="flex-1 px-4 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200 transition-all">Cancel</button>
                    <button id="confirmOk" class="flex-1 px-4 py-2.5 bg-red-600 text-white rounded-xl text-sm font-bold hover:bg-red-700 transition-all">Yes, Clear All</button>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Filter by Provision</label>
                <select id="provisionFilter" class="w-full px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm appearance-none cursor-pointer">
                    <option value="All Provisions">All Provisions</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sort by</label>
                <select id="sortOrder" class="w-full px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm appearance-none cursor-pointer">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="alphabetical">Alphabetical</option>
                </select>
            </div>
        </div>

        <!-- Content -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="w-8 h-8 border-4 border-gray-200 border-t-black rounded-full animate-spin mb-4"></div>
            <p class="text-sm text-gray-500">Connecting to database...</p>
        </div>

        <div id="caseListContainer" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 border-b border-gray-100">
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400 w-16">#</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Case Name & Citation</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Provision / Topic / Article</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">SC Ruling</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Simple Explanation</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="caseList" class="divide-y divide-gray-100">
                        <!-- Cases will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="noResults" class="hidden text-center py-20">
            <p class="text-gray-500">No cases found matching your criteria.</p>
        </div>
    </div>

    <!-- Case Detail Modal -->
    <div id="caseModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4 md:p-8 bg-black/40 backdrop-blur-sm">
        <div class="relative w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
                <div class="flex-1 mr-4">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1 block">Case Details & Decisions</span>
                    <h2 id="modalTitle" class="text-xl font-bold text-gray-900"></h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="modalDownload" class="flex items-center gap-2 px-4 py-2 bg-black text-white rounded-xl hover:bg-gray-800 transition-all text-xs font-semibold shadow-sm">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> Download
                    </button>
                    <button id="modalClose" class="p-2 rounded-full hover:bg-gray-200 text-gray-400 hover:text-gray-600 transition-all">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            
            <div id="modalContent" class="overflow-y-auto p-8 space-y-8">
                <!-- Modal content will be injected here -->
            </div>

            <div class="p-6 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
                <button id="modalCloseFooter" class="px-6 py-2 text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">Close</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, writeBatch, doc, deleteDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            projectId: "gen-lang-client-0585193247",
            appId: "1:322011309302:web:a54588bec4ea267ba338d7",
            apiKey: "AIzaSyAdcJaRm_clIJr-EAASeTD39mCg2O6zdpQ",
            authDomain: "gen-lang-client-0585193247.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-526651e0-07fc-46a3-afc0-733e2988672f",
            storageBucket: "gen-lang-client-0585193247.firebasestorage.app",
            messagingSenderId: "322011309302"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let allCases = [];
        let currentUser = null;

        const caseListEl = document.getElementById('caseList');
        const caseListContainer = document.getElementById('caseListContainer');
        const loadingEl = document.getElementById('loading');
        const noResultsEl = document.getElementById('noResults');
        const searchInput = document.getElementById('searchInput');
        const provisionFilter = document.getElementById('provisionFilter');
        const sortOrder = document.getElementById('sortOrder');
        
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const adminActions = document.getElementById('adminActions');
        const importBtn = document.getElementById('importBtn');
        const clearBtn = document.getElementById('clearBtn');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const fileInput = document.getElementById('fileInput');

        const authStatus = document.getElementById('authStatus');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notificationText');
        const confirmModal = document.getElementById('confirmModal');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmOk = document.getElementById('confirmOk');
        const confirmCancel = document.getElementById('confirmCancel');

        const caseModal = document.getElementById('caseModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');
        const modalCloseFooter = document.getElementById('modalCloseFooter');
        const modalDownload = document.getElementById('modalDownload');

        let selectedCase = null;

        function showNotification(message, type = 'info') {
            notificationText.textContent = message;
            notification.classList.remove('translate-y-20', 'opacity-0');
            notification.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                notification.classList.add('translate-y-20', 'opacity-0');
                notification.classList.remove('translate-y-0', 'opacity-100');
            }, 5000);
        }

        function showConfirm(message, onConfirm) {
            confirmMessage.textContent = message;
            confirmModal.classList.remove('hidden');
            
            const handleOk = () => {
                onConfirm();
                close();
            };
            const close = () => {
                confirmModal.classList.add('hidden');
                confirmOk.removeEventListener('click', handleOk);
                confirmCancel.removeEventListener('click', close);
            };
            
            confirmOk.addEventListener('click', handleOk);
            confirmCancel.addEventListener('click', close);
        }

        // Auth Listener
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                authStatus.textContent = `Logged in as ${user.displayName || user.email}`;
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                adminActions.classList.remove('hidden');
            } else {
                authStatus.textContent = '';
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                adminActions.classList.add('hidden');
            }
        });

        // Login/Logout
        loginBtn.addEventListener('click', async () => {
            try {
                authStatus.textContent = 'Logging in...';
                await signInWithPopup(auth, provider);
            } catch (error) {
                authStatus.textContent = 'Login failed';
                console.error("Login error:", error);
                showNotification("Login failed: " + error.message + "\n\nNote: If you are running this file locally (file://), Google Login may be restricted by Firebase. Try hosting it on a web server or using the main app.");
            }
        });
        logoutBtn.addEventListener('click', () => signOut(auth));

        // Initial fetch
        const q = collection(db, "cases");
        onSnapshot(q, (snapshot) => {
            allCases = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            console.log("Fetched cases:", allCases.length);
            updateProvisions();
            render();
            loadingEl.classList.add('hidden');
            caseListContainer.classList.remove('hidden');
        }, (error) => {
            console.error("Firestore error:", error);
            loadingEl.innerHTML = `<p class="text-red-500 font-medium">Error connecting to database. Please check your connection.</p>`;
        });

        function updateProvisions() {
            const provisions = ['All Provisions', ...new Set(allCases.map(c => c.provisionTopic || c.provision).filter(Boolean))];
            provisionFilter.innerHTML = provisions.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        // CSV Export
        exportCsvBtn.addEventListener('click', () => {
            if (allCases.length === 0) return showNotification('No cases to export.');
            
            const headers = ['Case Name/Citation', 'Provision/Topic', 'Issues', 'SC Ruling', 'Rationale', 'Date'];
            const rows = allCases.map(c => [
                c.caseNameCitation || '',
                c.provisionTopic || '',
                (c.issueSuccession || '').replace(/\n/g, ' '),
                (c.scRuling || '').replace(/\n/g, ' '),
                (c.rationaleBasis || '').replace(/\n/g, ' '),
                c.createdAt ? new Date(c.createdAt.seconds * 1000).toLocaleDateString() : ''
            ]);

            const csvContent = [
                headers.join(','),
                ...rows.map(r => r.map(v => `"${v.toString().replace(/"/g, '""')}"`).join(','))
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `legal_cases_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification('CSV Exported successfully.');
        });

        // Clear Database
        clearBtn.addEventListener('click', () => {
            showConfirm('Are you sure you want to clear the entire database? This cannot be undone.', async () => {
                try {
                    const batch = writeBatch(db);
                    allCases.forEach(c => {
                        batch.delete(doc(db, "cases", c.id));
                    });
                    await batch.commit();
                    showNotification('Database cleared successfully.');
                } catch (error) {
                    showNotification('Error clearing database: ' + error.message);
                }
            });
        });

        // Import
        importBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const content = event.target.result;
                    let data = [];
                    
                    if (file.name.endsWith('.json')) {
                        data = JSON.parse(content);
                    } else if (file.name.endsWith('.csv')) {
                        const lines = content.split('\n');
                        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                        data = lines.slice(1).filter(l => l.trim()).map(line => {
                            const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
                            const obj = {};
                            headers.forEach((h, i) => {
                                const header = h.toLowerCase();
                                if (header.includes('case') || header.includes('title')) obj.caseNameCitation = values[i];
                                if (header.includes('provision') || header.includes('topic')) obj.provisionTopic = values[i];
                                if (header.includes('issue')) obj.issueSuccession = values[i];
                                if (header.includes('ruling')) obj.scRuling = values[i];
                                if (header.includes('rationale')) obj.rationaleBasis = values[i];
                                if (header.includes('petitioner')) obj.petitioner = values[i];
                                if (header.includes('respondent')) obj.respondent = values[i];
                                if (header.includes('explanation')) obj.simpleExplanation = values[i];
                            });
                            return obj;
                        });
                    }

                    if (!Array.isArray(data)) throw new Error('Invalid data format');

                    const batch = writeBatch(db);
                    data.forEach(item => {
                        const newDoc = doc(collection(db, "cases"));
                        batch.set(newDoc, {
                            ...item,
                            createdAt: serverTimestamp(),
                            updatedAt: serverTimestamp()
                        });
                    });
                    await batch.commit();
                    showNotification(`Successfully imported ${data.length} cases.`);
                } catch (error) {
                    showNotification('Error importing data: ' + error.message);
                }
                fileInput.value = '';
            };
            reader.readAsText(file);
        });

        function render() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedProvision = provisionFilter.value;
            const sort = sortOrder.value;

            let filtered = allCases.filter(c => {
                const title = (c.caseNameCitation || c.title || '').toLowerCase();
                const issues = (c.issueSuccession || c.issues || '').toLowerCase();
                const provision = (c.provisionTopic || c.provision || '').toLowerCase();
                
                const matchesSearch = title.includes(searchTerm) || 
                                     issues.includes(searchTerm) ||
                                     provision.includes(searchTerm);
                const matchesProvision = selectedProvision === 'All Provisions' || 
                                       (c.provisionTopic === selectedProvision || c.provision === selectedProvision);
                return matchesSearch && matchesProvision;
            });

            // Sorting
            if (sort === 'oldest') {
                filtered.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            } else if (sort === 'alphabetical') {
                filtered.sort((a, b) => (a.caseNameCitation || a.title || '').localeCompare(b.caseNameCitation || b.title || ''));
            } else {
                filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            }

            if (allCases.length === 0) {
                caseListContainer.classList.add('hidden');
                noResultsEl.classList.remove('hidden');
                noResultsEl.innerHTML = `
                    <div class="flex flex-col items-center gap-4">
                        <p class="text-gray-500">The database is currently empty.</p>
                        <p class="text-xs text-gray-400">Click "Import" to upload your cases.</p>
                    </div>
                `;
            } else if (filtered.length === 0) {
                caseListContainer.classList.add('hidden');
                noResultsEl.classList.remove('hidden');
                noResultsEl.innerHTML = `<p class="text-gray-500">No cases found matching your criteria.</p>`;
            } else {
                caseListContainer.classList.remove('hidden');
                noResultsEl.classList.add('hidden');
                caseListEl.innerHTML = filtered.map((c, index) => {
                    const combinedTopic = [c.provisionTopic, c.articleCited, c.provision]
                        .filter(val => val && String(val).trim() !== '')
                        .map(val => String(val).trim())
                        .join(' | ') || '—';
                    
                    return `
                        <tr class="hover:bg-gray-50/50 transition-colors cursor-pointer group" onclick="openModal('${c.id}')">
                            <td class="px-6 py-4 text-sm font-medium text-gray-400">${index + 1}</td>
                            <td class="px-6 py-4 text-sm font-semibold text-gray-900">${c.caseNameCitation || c.title || 'Untitled Case'}</td>
                            <td class="px-6 py-4 text-sm text-gray-600">${combinedTopic}</td>
                            <td class="px-6 py-4 text-sm text-gray-600 line-clamp-2 max-w-xs">${c.scRuling || c.ruling || '—'}</td>
                            <td class="px-6 py-4 text-sm text-gray-500 italic line-clamp-2 max-w-xs">${c.simpleExplanation || '—'}</td>
                            <td class="px-6 py-4 text-right">
                                <button class="inline-flex items-center gap-2 px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-all shadow-sm">
                                    Full Details
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
                lucide.createIcons();
            }
        }

        window.openModal = (id) => {
            const item = allCases.find(c => c.id === id);
            if (!item) return;
            selectedCase = item;
            
            modalTitle.textContent = item.caseNameCitation || item.title || 'Untitled Case';
            
            const combinedTopic = [item.provisionTopic, item.articleCited, item.provision]
                .filter(val => val && String(val).trim() !== '')
                .map(val => String(val).trim())
                .join(' | ') || '—';

            modalContent.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <span class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 block mb-1">Petitioner</span>
                        <p class="text-sm font-medium text-gray-900">${item.petitioner || '—'}</p>
                    </div>
                    <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <span class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 block mb-1">Respondent</span>
                        <p class="text-sm font-medium text-gray-900">${item.respondent || '—'}</p>
                    </div>
                    <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <span class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 block mb-1">Provisions</span>
                        <p class="text-sm font-medium text-gray-900">${item.provisions || '—'}</p>
                    </div>
                    <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <span class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 block mb-1">Topic & Article Cited</span>
                        <p class="text-sm font-medium text-gray-900">${combinedTopic}</p>
                    </div>
                </div>

                <section>
                    <h3 class="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                        <div class="w-1 h-4 bg-black rounded-full"></div>
                        Facts
                    </h3>
                    <div class="p-5 bg-gray-50 rounded-2xl border border-gray-100">
                        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">${item.facts || 'No facts available.'}</p>
                    </div>
                </section>

                <section>
                    <h3 class="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                        <div class="w-1 h-4 bg-black rounded-full"></div>
                        Issue (Succession)
                    </h3>
                    <div class="p-5 bg-indigo-50/30 rounded-2xl border border-indigo-100/50">
                        <p class="text-sm text-indigo-900 leading-relaxed font-medium">${item.issueSuccession || item.issues || 'No issue described.'}</p>
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="p-5 border border-gray-100 rounded-2xl">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">RTC Decision</span>
                        <p class="text-sm text-gray-600 leading-relaxed">${item.rtcDecision || '—'}</p>
                    </div>
                    <div class="p-5 border border-gray-100 rounded-2xl">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">CA Decision</span>
                        <p class="text-sm text-gray-600 leading-relaxed">${item.caDecision || '—'}</p>
                    </div>
                    <div class="p-5 bg-emerald-50/30 border border-emerald-100/50 rounded-2xl">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-emerald-600 block mb-2">SC Ruling</span>
                        <p class="text-sm text-emerald-900 font-medium leading-relaxed">${item.scRuling || item.ruling || '—'}</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <section>
                        <h3 class="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                            <div class="w-1 h-4 bg-black rounded-full"></div>
                            Rationale / Civil Code Basis
                        </h3>
                        <div class="p-5 bg-gray-50 rounded-2xl border border-gray-100">
                            <p class="text-sm text-gray-700 leading-relaxed">${item.rationaleBasis || '—'}</p>
                        </div>
                    </section>
                    <section>
                        <h3 class="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                            <div class="w-1 h-4 bg-black rounded-full"></div>
                            Simple Explanation
                        </h3>
                        <div class="p-5 bg-amber-50/30 rounded-2xl border border-amber-100/50">
                            <p class="text-sm text-amber-900 leading-relaxed italic">${item.simpleExplanation || '—'}</p>
                        </div>
                    </section>
                </div>

                <section>
                    <h3 class="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                        <div class="w-1 h-4 bg-black rounded-full"></div>
                        Full Digest
                    </h3>
                    <div class="p-6 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="prose prose-sm max-w-none text-gray-700 leading-relaxed whitespace-pre-wrap">${item.fullDigest || item.digest || 'No digest available.'}</div>
                    </div>
                </section>
            `;
            
            caseModal.classList.remove('hidden');
            lucide.createIcons();
        };

        const closeModal = () => {
            caseModal.classList.add('hidden');
            selectedCase = null;
        };

        modalClose.addEventListener('click', closeModal);
        modalCloseFooter.addEventListener('click', closeModal);
        caseModal.addEventListener('click', (e) => {
            if (e.target === caseModal) closeModal();
        });

        modalDownload.addEventListener('click', () => {
            if (!selectedCase) return;
            const item = selectedCase;
            const combinedTopic = [item.provisionTopic, item.articleCited, item.provision]
                .filter(val => val && String(val).trim() !== '')
                .map(val => String(val).trim())
                .join(' | ');

            const content = `CASE BRIEF: ${item.caseNameCitation || item.title}

PETITIONER: ${item.petitioner || '—'}
RESPONDENT: ${item.respondent || '—'}
PROVISIONS: ${item.provisions || '—'}
TOPIC & ARTICLE CITED: ${combinedTopic || '—'}

FACTS:
${item.facts || '—'}

ISSUE (SUCCESSION):
${item.issueSuccession || item.issues || '—'}

DECISIONS:
RTC: ${item.rtcDecision || '—'}
CA: ${item.caDecision || '—'}
SC: ${item.scRuling || item.ruling || '—'}

RATIONALE / CIVIL CODE BASIS:
${item.rationaleBasis || '—'}

SIMPLE EXPLANATION:
${item.simpleExplanation || '—'}

FULL DIGEST:
${item.fullDigest || item.digest || '—'}
`;

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${(item.caseNameCitation || item.title).replace(/[^a-z0-9]/gi, '_').toLowerCase()}_brief.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        // Event Listeners
        searchInput.addEventListener('input', render);
        provisionFilter.addEventListener('change', render);
        sortOrder.addEventListener('change', render);

        // Initialize Lucide
        lucide.createIcons();
    </script>
</body>
</html>
